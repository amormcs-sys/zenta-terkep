<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenta Község - Mezőőrszolgálat</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial, sans-serif; background-color: #cccccc; }
        #map { height: 100%; width: 100%; background: #e5e3df; }
        #controls { position: absolute; bottom: 20px; left: 20px; z-index: 1000; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.3); width: 280px; max-height: 80vh; overflow-y: auto; }
        #search-panel { position: absolute; top: 20px; left: 60px; z-index: 1000; background: white; padding: 12px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 8px; width: 220px; }
        .search-group { display: flex; gap: 5px; }
        .search-input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .search-btn { padding: 6px 10px; background:#28a745; color:white; border:none; border-radius:4px; cursor:pointer; font-weight: bold; font-size: 12px; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 12px; }
        .color-box { width: 20px; height: 10px; margin-right: 10px; border-radius: 2px; }
        .btn { width:100%; padding:8px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; margin-top: 5px; }
        .admin-only { display: none; }
        .popup-btn { padding: 4px 8px; margin-top: 5px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; color: white; }
    </style>
</head>
<body>

    <div id="search-panel">
        <div class="search-group">
            <input type="text" id="search-input" class="search-input" placeholder="Utca vagy dűlő keresése...">
            <button onclick="kereses()" class="search-btn">Térkép</button>
        </div>
        <hr style="margin: 2px 0; border: 0; border-top: 1px solid #eee;">
        <div style="font-size: 11px; font-weight: bold; color: #333;">eKatastar Tulajdonos Kereső:</div>
        <select id="kataszter-ko" class="search-input">
            <option value="705764">Zenta (Senta)</option>
            <option value="705756">Tornyos (Tornjoš)</option>
            <option value="705730">Kevi (Kevi)</option>
            <option value="705748">Bogaras (Bogaraš)</option>
        </select>
        <div class="search-group">
            <input type="number" id="parcella-input" class="search-input" placeholder="Parcella száma...">
            <button onclick="kataszterKeres()" class="search-btn" style="background:#007bff;">Katastar 🇷🇸</button>
        </div>
    </div>

    <div id="map"></div>

    <div id="controls">
        <h4>Zenta Nyilvántartás</h4>
        <div id="login-section">
            <button onclick="adminBelep()" class="btn" style="background:#6c757d; color:white;">Adminisztrátori Belépés</button>
        </div>
        <div id="admin-status" style="font-size:12px; color:green; font-weight:bold; margin-bottom:5px; display:none;">Módosítás engedélyezve (Admin)</div>
        
        <div class="admin-only" style="background: #f0f0f0; padding: 10px; border-radius: 5px; margin-bottom: 10px;">
            <label style="font-size: 12px; font-weight: bold;">Aktív rajzolási réteg:</label>
            <select id="rajz-reteg" class="search-input" style="margin-top:5px;">
                <option value="ut">Közúti hálózat (Utak)</option>
                <option value="viz">Vízvezeték</option>
                <option value="kanal">Kanalizáció</option>
            </select>
        </div>

        <hr>
        <h5>Jelmagyarázat (Utak)</h5>
        <div class="legend-item"><div class="color-box" style="background: red;"></div> Piros: Nincs kész</div>
        <div class="legend-item"><div class="color-box" style="background: green;"></div> Zöld: Kész van</div>
        <div class="legend-item"><div class="color-box" style="background: purple;"></div> Lila: Döntés előtt áll</div>
        <div class="legend-item"><div class="color-box" style="background: yellow;"></div> Sárga: Salakos jó állapotú</div>
        <div class="legend-item"><div class="color-box" style="background: orange;"></div> Narancs: Karbantartást igényel</div>
        <div class="legend-item"><div class="color-box" style="background: blue;"></div> Kék: Földes út kész</div>
        <hr>
        <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:2px;">Adatok betöltése (.json / .kml):</label>
        <input type="file" id="fajlBeolvas" accept=".kml,.json" style="font-size:11px; width:100%; margin-bottom:10px;">
        <div class="admin-only">
            <button onclick="mentes()" class="btn" style="background:#007bff; color:white;">Térkép Mentése a Gépre</button>
        </div>
    </div>

    <script>
        var map = L.map('map', { minZoom: 2, maxZoom: 18 }).setView([45.9275, 20.0889], 13);
        var isAdmin = false;

        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
        var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri' });
        var geoSrbijaParcele = L.tileLayer.wms("https://geosrbija.rgz.gov.rs/geoserver/rgz/wms", { layers: 'rgz:parcele', format: 'image/png', transparent: true, version: '1.1.1', attribution: '© GeoSrbija' });

        var utHalozat = new L.FeatureGroup().addTo(map);
        var vizVezetek = new L.FeatureGroup().addTo(map);
        var kanalizacio = new L.FeatureGroup().addTo(map);
        var hidransok = new L.FeatureGroup().addTo(map);

        L.control.layers(
            { "Utcai nézet": osm, "Műholdas nézet": satellite },
            { "GeoSrbija Parcellák 🇷🇸": geoSrbijaParcele, "Közúti hálózat": utHalozat, "Vízvezetékek": vizVezetek, "Kanalizáció": kanalizacio, "Hidránsok": hidransok }
        ).addTo(map);

        // Szerkesztő eszközök beállítása (vonalak módosítására is!)
        var drawControl = new L.Control.Draw({
            draw: { polyline: true, polygon: false, circle: false, marker: true, circlemarker: false, rectangle: false },
            edit: { featureGroup: utHalozat, remove: true }
        });

        function adminBelep() {
            var jelszo = prompt("Kérjük az adminisztrátori jelszót:");
            if (jelszo === "zenta2026") {
                isAdmin = true;
                document.getElementById("login-section").style.display = "none";
                document.getElementById("admin-status").style.display = "block";
                map.addControl(drawControl);
                
                // Engedélyezzük a szerkesztést a többi rétegen is
                drawControl.options.edit.featureGroup = utHalozat; 

                var adminGombok = document.querySelectorAll('.admin-only');
                adminGombok.forEach(function(el) { el.style.display = 'block'; });
                frissitPopupokat();
                alert("Sikeres belépés! Most már kattintással is szerkesztheted az elemeket.");
            } else { alert("Hibás jelszó!"); }
        }

        function kataszterKeres() {
            var opstinaId = "70890"; var koId = document.getElementById("kataszter-ko").value; var parcelaBr = document.getElementById("parcella-input").value; 
            if(!parcelaBr) { alert("Kérjük írd be a parcella számát!"); return; }
            var url = `https://katastar.rgz.gov.rs/eKatastarPublic/FindParcelResult.aspx?opstinaID=${opstinaId}&koID=${koId}&parcelaBr=${parcelaBr}`;
            window.open(url, '_blank');
        }

        function fixDriveLink(link) {
            if (!link) return "";
            if (link.includes("drive.google.com")) {
                var matches = link.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if (matches && matches[1]) { return "https://lh3.googleusercontent.com/d/" + matches[1]; }
            }
            return link;
        }

        // STÍLUS BEÁLLÍTÁSA STÁTUSZ ALAPJÁN
        function sorszín(statusz, reteg) {
            if (reteg === "viz") return "cyan";
            if (reteg === "kanal") return "brown";
            
            if(statusz == "zold") return "green";
            if(statusz == "lila") return "purple";
            if(statusz == "sarga") return "yellow";
            if(statusz == "narancs") return "orange";
            if(statusz == "kek") return "blue";
            return "red";
        }

        // POPUP TARTALOM GENERÁLÁSA (ADMIN VAGY SIMA)
        function popupTartalom(data, layerId) {
            var pop = `<b>${data.nev || "Névtelen"}</b><br>${data.leiras || ""}`;
            if(data.kep) pop += `<br><br><img src="${data.kep}" width="260px" style="border-radius:4px;">`;
            
            if(isAdmin) {
                pop += `<hr><button onclick="elemSzerkeszt('${layerId}')" class="popup-btn" style="background:#007bff; margin-right:5px;">Szerkesztés</button>`;
                pop += `<button onclick="elemTorol('${layerId}')" class="popup-btn" style="background:#dc3545;">Törlés</button>`;
            }
            return pop;
        }

        function frissitPopupokat() {
            [utHalozat, vizVezetek, kanalizacio, hidransok].forEach(function(group) {
                group.eachLayer(function(layer) {
                    if(layer.options.customData) {
                        layer.bindPopup(popupTartalom(layer.options.customData, L.stamp(layer)));
                    }
                });
            });
        }

        // ÚJ ELEM LÉTREHOZÁSA
        map.on(L.Draw.Event.CREATED, function (e) {
            var layer = e.layer;
            var tipus = e.layerType;
            var valasztottReteg = document.getElementById("rajz-reteg").value;

            if (tipus === 'marker') {
                var hNev = prompt("Pont / Hidráns megnevezése:", "Hidráns");
                var hLeiras = prompt("Megjegyzés:", "Működőképes");
                layer.options.customData = { nev: hNev, statusz: "hidrans", leiras: hLeiras, kep: "", reteg: "hidrans" };
                hidransok.addLayer(layer);
            } else {
                var nev = prompt("Megnevezés (Út neve / Cső átmérő):", "Új elem");
                var statusz = "piros";
                if(valasztottReteg === "ut") {
                    statusz = prompt("Állapot (piros / zold / lila / sarga / narancs / kek):", "piros");
                }
                var leiras = prompt("Leírás / Megjegyzés:", "");
                var driveLinkRaw = prompt("Google Drive kép linkje (ha van):", "");
                var joDriveKep = fixDriveLink(driveLinkRaw);

                layer.options.customData = { nev: nev, statusz: statusz, leiras: leiras, kep: joDriveKep, reteg: valasztottReteg };
                
                layer.setStyle({ color: sorszín(statusz, valasztottReteg), weight: 5 });

                if(valasztottReteg === "viz") vizVezetek.addLayer(layer);
                else if(valasztottReteg === "kanal") kanalizacio.addLayer(layer);
                else utHalozat.addLayer(layer);
            }
            frissitPopupokat();
        });

        // ELEM TÖRLESE POPUPBÓL
        window.elemTorol = function(layerId) {
            if(confirm("Biztosan törölni akarod ezt az elemet?")) {
                [utHalozat, vizVezetek, kanalizacio, hidransok].forEach(function(group) {
                    var layer = group.getLayer(layerId);
                    if(layer) { group.removeLayer(layer); }
                });
            }
        };

        // ELEM SZERKESZTÉSE POPUPBÓL
        window.elemSzerkeszt = function(layerId) {
            var celLayer = null;
            [utHalozat, vizVezetek, kanalizacio, hidransok].forEach(function(group) {
                if(group.getLayer(layerId)) celLayer = group.getLayer(layerId);
            });

            if(celLayer && celLayer.options.customData) {
                var d = celLayer.options.customData;
                var ujNev = prompt("Új megnevezés:", d.nev);
                if(ujNev === null) return;
                
                var ujStatusz = d.statusz;
                if(d.reteg === "ut") {
                    ujStatusz = prompt("Új állapot (piros / zold / lila / sarga / narancs / kek):", d.statusz);
                }
                var ujLeiras = prompt("Új leírás:", d.leiras);
                var ujKep = prompt("Új Google Drive kép link:", d.kep);

                d.nev = ujNev;
                d.statusz = ujStatusz;
                d.leiras = ujLeiras;
                d.kep = fixDriveLink(ujKep);

                if(celLayer.setStyle) {
                    celLayer.setStyle({ color: sorszín(ujStatusz, d.reteg) });
                }
                celLayer.setPopupContent(popupTartalom(d, layerId));
                alert("Módosítások elmentve a térképen!");
            }
        };

        function kereses() {
            var keresettSzoveg = document.getElementById("search-input").value.toLowerCase();
            var talalat = false;
            utHalozat.eachLayer(function(layer) {
                if (layer.options.customData && layer.options.customData.nev.toLowerCase().includes(keresettSzoveg)) {
                    map.fitBounds(layer.getBounds()); layer.openPopup(); talalat = true;
                }
            });
            if(!talalat) alert("Nincs ilyen nevű út!");
        }

        // FÁJL BEOLVASÁS (MINDEN RÉTEGET HELYRETESZ)
        document.getElementById('fajlBeolvas').addEventListener('change', function(e) {
            var fajl = e.target.files[0]; if (!fajl) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var tartalom = e.target.result;
                if (fajl.name.endsWith('.json')) {
                    var adatok = JSON.parse(tartalom);
                    
                    // Kitakarítjuk a meglévőket betöltés előtt
                    utHalozat.clearLayers(); vizVezetek.clearLayers(); kanalizacio.clearLayers(); hidransok.clearLayers();

                    L.geoJSON(adatok, {
                        style: function(feature) {
                            var p = feature.properties;
                            return { color: sorszín(p.statusz, p.reteg), weight: 5 };
                        },
                        onEachFeature: function(feature, layer) {
                            var p = feature.properties;
                            layer.options.customData = p;
                            
                            if(p.reteg === "hidrans" || p.statusz === "hidrans") { hidransok.addLayer(layer); }
                            else if(p.reteg === "viz") { vizVezetek.addLayer(layer); }
                            else if(p.reteg === "kanal") { kanalizacio.addLayer(layer); }
                            else { utHalozat.addLayer(layer); }
                        }
                    });
                    frissitPopupokat();
                    alert("Minden adat és réteg sikeresen betöltve!");
                }
            };
            reader.readAsText(fajl);
        });

        // ÖSSZES RÉTEG MENTÉSE EGYETLEN GEOJSON FÁJLBA
        function mentes() {
            var gyujto = { type: "FeatureCollection", features: [] };

            [utHalozat, vizVezetek, kanalizacio, hidransok].forEach(function(group) {
                group.eachLayer(function(layer) {
                    if(layer.options.customData) {
                        var geojson = layer.toGeoJSON();
                        geojson.properties = layer.options.customData;
                        gyujto.features.push(geojson);
                    }
                });
            });

            var dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(gyujto));
            var downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "zenta_teljes_nyilvantartas.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
    </script>
</body>
</html>
